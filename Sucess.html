<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Welcome to Vitara ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080F;--gold:#C9A84C;--green:#4CAF7D;--text:#F0EDE6;--muted:#6B7280;--surface:#0D1117;--border:rgba(255,255,255,0.07)}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:32px;padding:64px 56px;max-width:520px;width:100%;text-align:center;box-shadow:0 40px 120px rgba(0,0,0,0.5);animation:rise .8s cubic-bezier(.16,1,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.loader-ring{width:64px;height:64px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--gold);animation:spin .9s linear infinite;margin:0 auto 20px}

.state-success{display:none;flex-direction:column;align-items:center}

.checkmark{font-size:36px}
.welcome-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:12px}

</style>
</head>
<body>
<div class="card" id="card">
  <div id="stateLoading">
    <div class="loader-ring"></div>
    <div class="loading-text">Confirming your payment...</div>
  </div>
  <div class="state-success" id="stateSuccess">
    <div class="checkmark-wrap"><div class="checkmark">✓</div></div>
    <div class="welcome-label">Payment Confirmed</div>
    <h1>Welcome to<br/><em>Vitara.</em></h1>
    <p class="subtitle">Your wellness journey starts right now.</p>
    <div class="plan-badge">
      <div>
        <div class="plan-name" id="planName">Vitara Pro</div>
        <div class="plan-detail" id="planDetail">7-day free trial active</div>
      </div>
    </div>
    <button class="btn-start" onclick="goToOnboarding()">Start My Onboarding →</button>
  </div>
  <div class="state-error" id="stateError">
    <div style="font-size:48px;margin-bottom:20px">⚠️</div>
    <div class="error-title">Something went wrong</div>
    <p class="error-msg" id="errorMsg">We couldn't confirm your payment.</p>
    <button class="btn-retry" onclick="window.location.href='vitara-global.html'">← Back to Vitara</button>
  </div>
</div>

<script>
const SERVER = "https://vitara-production.up.railway.app";

async function confirmSession() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");
  const plan = params.get("plan");

  if (plan === "free" || !sessionId) {
    saveUser({email:"—", name:"Friend", plan:"free"});
    showSuccess({plan:"free"});
    return;
  }

  try {
    const res = await fetch(`${SERVER}/session-status?session_id=${sessionId}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    saveUser({
      email: data.customer_email,
      name: data.customer_name || "Friend",
      plan: data.plan || "pro",
      subscription_id: data.subscription_id,
      trial_end: data.trial_end,
      joined: new Date().toISOString(),
      onboarded: false
    });
    showSuccess(data);
  } catch(err) {
    showError("Could not confirm payment. Please contact support.");
  }
}

function saveUser(data) {
  localStorage.setItem("vitara_user", JSON.stringify(data));
}

function showSuccess(data) {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateSuccess').style.display = 'flex';
  const plan = data.plan || "pro";
  document.getElementById('planName').textContent = plan === 'annual' ? 'Vitara Annual' : plan === 'free' ? 'Vitara Free' : 'Vitara Pro';
  document.getElementById('planDetail').textContent = plan === 'free' ? 'Always free' : plan === 'annual' ? 'Full access unlocked' : '7-day free trial active';
}

function showError(msg) {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateError').style.display = 'flex';
  document.getElementById('errorMsg').textContent = msg;
}

function goToOnboarding() {
  window.location.href = "onboarding.html";
}

confirmSession();
</script>
</body>
</html>
